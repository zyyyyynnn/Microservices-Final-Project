<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfbfb"/>
      <stop offset="100%" stop-color="#ebedee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <g transform="translate(200, 200)" filter="url(#shadow)">
    <!-- Base -->
    <rect x="-40" y="100" width="80" height="10" rx="4" fill="#e0e0e0"/>
    <!-- Stand -->
    <rect x="-6" y="20" width="12" height="80" fill="#f5f5f5"/>
    <circle cx="0" cy="20" r="10" fill="#d0d0d0"/>
    <!-- Arm -->
    <path d="M0,20 L40,-50" stroke="#f5f5f5" stroke-width="10" stroke-linecap="round"/>
    <circle cx="40" cy="-50" r="8" fill="#d0d0d0"/>
    <!-- Lamp Head -->
    <path d="M40,-50 L-30,-70" stroke="#f5f5f5" stroke-width="12" stroke-linecap="round"/>
    <!-- Light Beam -->
    <polygon points="-20,-60 -50,60 10,60" fill="#ffd700" opacity="0.3"/>
    <!-- Light Bulb -->
    <ellipse cx="-20" cy="-60" rx="15" ry="5" fill="#fff" transform="rotate(-15 -20 -60)"/>
  </g>
</svg>
