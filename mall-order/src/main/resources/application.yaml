server:
  port: 9006

spring:
  application:
    name: mall-order
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      config:
        file-extension: yaml
        shared-dataids: common-mysql.yaml,common-redis.yaml,common-rocketmq.yaml,common-sentinel.yaml,common-seata.yaml
        refresh-enabled: true
        extension-configs[0]:
          dataId: mall-order.yaml
          group: DEFAULT_GROUP
          refresh: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
        loggerLevel: BASIC
  sentinel:
    enabled: true
  okhttp:
    enabled: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mallcloud.mallorder: DEBUG
