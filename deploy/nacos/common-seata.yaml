# MallCloud 公共 Seata 配置
seata:
  application-id: ${spring.application.name}
  tx-service-group: mallcloud-tx-group
  enable-auto-data-source-proxy: true
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      group: SEATA_GROUP
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      group: SEATA_GROUP
      application: seata-server
