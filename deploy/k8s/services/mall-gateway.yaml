apiVersion: apps/v1
kind: Deployment
metadata:
  name: mall-gateway
  namespace: mallcloud
  labels:
    app: mall-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mall-gateway
  template:
    metadata:
      labels:
        app: mall-gateway
    spec:
      containers:
        - name: mall-gateway
          image: mallcloud/mall-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9100
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: NACOS_SERVER
              value: mall-nacos:8848
            - name: REDIS_HOST
              value: mall-redis
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mallcloud-secret
                  key: jwt-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 9100
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 9100
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mall-gateway
  namespace: mallcloud
spec:
  selector:
    app: mall-gateway
  ports:
    - name: http
      port: 9100
      targetPort: 9100
  type: ClusterIP
