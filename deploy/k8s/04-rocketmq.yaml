---
# 04-rocketmq.yaml
# RocketMQ 5.x（NameSrv + Broker + Console）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rocketmq-data
  namespace: mallcloud
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
# NameSrv
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-namesrv
  namespace: mallcloud
  labels:
    app: rocketmq-namesrv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-namesrv
  template:
    metadata:
      labels:
        app: rocketmq-namesrv
    spec:
      containers:
        - name: namesrv
          image: apache/rocketmq:5.1.4
          command: ["sh", "-c"]
          args: ["mqnamesrv"]
          ports:
            - containerPort: 9876
              name: namesrv
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-namesrv
  namespace: mallcloud
spec:
  type: ClusterIP
  ports:
    - port: 9876
      targetPort: 9876
      name: namesrv
  selector:
    app: rocketmq-namesrv
---
# Broker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-broker
  namespace: mallcloud
  labels:
    app: rocketmq-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker
  template:
    metadata:
      labels:
        app: rocketmq-broker
    spec:
      containers:
        - name: broker
          image: apache/rocketmq:5.1.4
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /tmp/rocketmq/store
              mqbroker -n rocketmq-namesrv:9876 \
                -c /opt/rocketmq/conf/broker.conf \
                -m cluster \
                --enable-controller false
          ports:
            - containerPort: 10909
              name: ha
            - containerPort: 10911
              name: broker
            - containerPort: 10912
              name: acl
          env:
            - name: NAMESRV_ADDR
              value: rocketmq-namesrv:9876
          volumeMounts:
            - name: data
              mountPath: /tmp/rocketmq/store
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 3Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rocketmq-data
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker
  namespace: mallcloud
spec:
  type: ClusterIP
  ports:
    - port: 10911
      targetPort: 10911
      name: broker
  selector:
    app: rocketmq-broker
---
# Console
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketmq-console
  namespace: mallcloud
  labels:
    app: rocketmq-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-console
  template:
    metadata:
      labels:
        app: rocketmq-console
    spec:
      containers:
        - name: console
          image: apacherocketmq/rocketmq-console-ng:2.0.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: JAVA_OPTS
              value: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-console
  namespace: mallcloud
spec:
  type: ClusterIP
  ports:
    - port: 8180
      targetPort: 8080
      name: http
  selector:
    app: rocketmq-console
