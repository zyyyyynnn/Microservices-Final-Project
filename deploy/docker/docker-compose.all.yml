version: '3.8'

# MallCloud 全栈编排（含 13 个微服务 + 中间件）
# 启动：docker compose -f docker-compose.all.yml up -d
# 注意：依赖 docker-compose.middleware.yml 先启动中间件

services:
  # ============== 业务服务 ==============
  mall-gateway:
    build: ../../mall-gateway
    image: mallcloud/mall-gateway:1.0.0
    container_name: mall-gateway
    restart: always
    depends_on:
      - nacos
      - redis
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      REDIS_HOST: mall-redis
      JWT_SECRET: mallcloud-dev-jwt-secret-20260609-rotated-after-report-leak-change-me-hs512-signing-key
    ports:
      - "9000:9000"
    networks:
      - mall-net

  mall-auth:
    build: ../../mall-auth
    image: mallcloud/mall-auth:1.0.0
    container_name: mall-auth
    restart: always
    depends_on:
      - nacos
      - mysql
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
      MYSQL_DB: mall_auth
    ports:
      - "9001:9001"
    networks:
      - mall-net

  mall-user:
    build: ../../mall-user
    image: mallcloud/mall-user:1.0.0
    container_name: mall-user
    restart: always
    depends_on:
      - nacos
      - mysql
      - redis
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
      MYSQL_DB: mall_user
      REDIS_HOST: mall-redis
    ports:
      - "9002:9002"
    networks:
      - mall-net

  mall-product:
    build: ../../mall-product
    image: mallcloud/mall-product:1.0.0
    container_name: mall-product
    restart: always
    depends_on:
      - nacos
      - mysql
      - redis
      - rocketmq-namesrv
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
      MYSQL_DB: mall_product
      REDIS_HOST: mall-redis
      ROCKETMQ_NAMESRV: mall-rocketmq-namesrv:9876
    ports:
      - "9003:9003"
    networks:
      - mall-net

  mall-inventory:
    build: ../../mall-inventory
    image: mallcloud/mall-inventory:1.0.0
    container_name: mall-inventory
    restart: always
    depends_on:
      - nacos
      - mysql
      - redis
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
      MYSQL_DB: mall_inventory
      REDIS_HOST: mall-redis
    ports:
      - "9004:9004"
    networks:
      - mall-net

  mall-cart:
    build: ../../mall-cart
    image: mallcloud/mall-cart:1.0.0
    container_name: mall-cart
    restart: always
    depends_on:
      - nacos
      - redis
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      REDIS_HOST: mall-redis
    ports:
      - "9005:9005"
    networks:
      - mall-net

  mall-order:
    build: ../../mall-order
    image: mallcloud/mall-order:1.0.0
    container_name: mall-order
    restart: always
    depends_on:
      - nacos
      - mysql
      - redis
      - rocketmq-namesrv
      - seata
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
      MYSQL_DB: mall_order
      REDIS_HOST: mall-redis
      ROCKETMQ_NAMESRV: mall-rocketmq-namesrv:9876
      SEATA_TC_URL: mall-seata:8091
    ports:
      - "9006:9006"
    networks:
      - mall-net

  mall-pay:
    build: ../../mall-pay
    image: mallcloud/mall-pay:1.0.0
    container_name: mall-pay
    restart: always
    depends_on:
      - nacos
      - mysql
      - rocketmq-namesrv
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
      MYSQL_DB: mall_pay
      ROCKETMQ_NAMESRV: mall-rocketmq-namesrv:9876
    ports:
      - "9007:9007"
    networks:
      - mall-net

  mall-search:
    build: ../../mall-search
    image: mallcloud/mall-search:1.0.0
    container_name: mall-search
    restart: always
    depends_on:
      - nacos
      - elasticsearch
      - rocketmq-namesrv
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      ES_HOST: mall-elasticsearch
      ES_PORT: 9200
      ROCKETMQ_NAMESRV: mall-rocketmq-namesrv:9876
    ports:
      - "9008:9008"
    networks:
      - mall-net

  mall-seckill:
    build: ../../mall-seckill
    image: mallcloud/mall-seckill:1.0.0
    container_name: mall-seckill
    restart: always
    depends_on:
      - nacos
      - mysql
      - redis
      - rocketmq-namesrv
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
      MYSQL_DB: mall_seckill
      REDIS_HOST: mall-redis
      ROCKETMQ_NAMESRV: mall-rocketmq-namesrv:9876
    ports:
      - "9009:9009"
    networks:
      - mall-net

  mall-message:
    build: ../../mall-message
    image: mallcloud/mall-message:1.0.0
    container_name: mall-message
    restart: always
    depends_on:
      - nacos
      - rocketmq-namesrv
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      ROCKETMQ_NAMESRV: mall-rocketmq-namesrv:9876
    ports:
      - "9010:9010"
    networks:
      - mall-net

  mall-admin-biz:
    build: ../../mall-admin-biz
    image: mallcloud/mall-admin-biz:1.0.0
    container_name: mall-admin-biz
    restart: always
    depends_on:
      - nacos
      - redis
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
    ports:
      - "9011:9011"
    networks:
      - mall-net

  mall-job:
    build: ../../mall-job
    image: mallcloud/mall-job:1.0.0
    container_name: mall-job
    restart: always
    depends_on:
      - nacos
      - mysql
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: test
      NACOS_SERVER: mall-nacos:8848
      MYSQL_HOST: mall-mysql
    ports:
      - "9012:9012"
    networks:
      - mall-net

  # ============== Web 前端 (Nginx) ==============
  web-portal:
    build:
      context: ../../web-portal
      dockerfile: ../deploy/docker/Dockerfile
    image: mallcloud/web-portal:1.0.0
    container_name: mall-web-portal
    restart: always
    ports:
      - "8081:80"
    networks:
      - mall-net

  web-admin:
    build:
      context: ../../web-admin
      dockerfile: ../deploy/docker/Dockerfile
    image: mallcloud/web-admin:1.0.0
    container_name: mall-web-admin
    restart: always
    ports:
      - "8082:80"
    networks:
      - mall-net

  nginx:
    image: nginx:1.25-alpine
    container_name: mall-nginx
    restart: always
    depends_on:
      - web-portal
      - web-admin
      - mall-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - mall-net

networks:
  mall-net:
    external: true
    name: mall-net
