events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20m;

    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ============== 用户前台 ==============
    server {
        listen 80;
        server_name _;

        # 前台
        location / {
            proxy_pass http://mall-web-portal:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 后台
        location /admin {
            proxy_pass http://mall-web-admin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API 网关
        location /api/ {
            proxy_pass http://mall-gateway:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Nacos 控制台
        location /nacos/ {
            proxy_pass http://mall-nacos:8848/nacos/;
        }

        # Sentinel 控制台
        location /sentinel/ {
            proxy_pass http://mall-sentinel:8858/;
        }

        # Zipkin
        location /zipkin/ {
            proxy_pass http://mall-zipkin:9411/;
        }
    }
}
