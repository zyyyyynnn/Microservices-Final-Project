server:
  port: 9108

spring:
  application:
    name: mall-search
  config:
    import:
      - optional:nacos:common-rocketmq.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:mall-search.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: dev
        group: DEFAULT_GROUP
      config:
        file-extension: yaml
        shared-dataids: common-rocketmq.yaml
        refresh-enabled: true
        extension-configs[0]:
          dataId: mall-search.yaml
          group: DEFAULT_GROUP
          refresh: true
  elasticsearch:
    uris: http://${ES_HOST:elasticsearch}:${ES_PORT:9200}
    connection-timeout: 5s
    socket-timeout: 30s

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:rocketmq-namesrv:9876}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mallcloud.mallsearch: DEBUG
    org.elasticsearch.client: INFO
