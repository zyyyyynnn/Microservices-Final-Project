server:
  port: 9004

spring:
  application:
    name: mall-inventory
  config:
    import:
      - optional:nacos:common-mysql.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common-redis.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common-sentinel.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common-seata.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:mall-inventory.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: dev
        group: DEFAULT_GROUP
      config:
        file-extension: yaml
        shared-dataids: common-mysql.yaml,common-redis.yaml,common-sentinel.yaml,common-seata.yaml
        refresh-enabled: true
        extension-configs[0]:
          dataId: mall-inventory.yaml
          group: DEFAULT_GROUP
          refresh: true
        extension-configs[1]:
          dataId: mall-inventory-degrade-rules.json
          group: SENTINEL_GROUP
          refresh: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:mall_inventory}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# Seata
seata:
  application-id: mall-inventory
  tx-service-group: mallcloud-tx-group
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      group: SEATA_GROUP
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      group: SEATA_GROUP
      application: seata-server

# Sentinel
spring.cloud.sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:sentinel:8080}
    port: 8719
  datasource:
    degrade:
      nacos:
        server-addr: ${NACOS_SERVER:nacos:8848}
        dataId: mall-inventory-degrade-rules.json
        groupId: SENTINEL_GROUP
        rule-type: degrade

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mallcloud.mallinventory: DEBUG
