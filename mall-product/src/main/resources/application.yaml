server:
  port: 9003

spring:
  application:
    name: mall-product
  config:
    import:
      - optional:nacos:common-mysql.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common-redis.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common-rocketmq.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:mall-product.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: dev
        group: DEFAULT_GROUP
      config:
        file-extension: yaml
        shared-dataids: common-mysql.yaml,common-redis.yaml,common-rocketmq.yaml
        refresh-enabled: true
        extension-configs[0]:
          dataId: mall-product.yaml
          group: DEFAULT_GROUP
          refresh: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:mall_product}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mallcloud.mallproduct: DEBUG
