server:
  port: 9010

spring:
  application:
    name: mall-message
  config:
    import:
      - optional:nacos:common-rocketmq.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:mall-message.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: dev
        group: DEFAULT_GROUP
      config:
        file-extension: yaml
        shared-dataids: common-rocketmq.yaml
        refresh-enabled: true
        extension-configs[0]:
          dataId: mall-message.yaml
          group: DEFAULT_GROUP
          refresh: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mallcloud.mallmessage: DEBUG
