server:
  port: 9109

spring:
  application:
    name: mall-seckill
  config:
    import:
      - optional:nacos:common-mysql.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common-rocketmq.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common-sentinel.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:mall-seckill.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos:8848}
      namespace: dev
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: dev
        group: DEFAULT_GROUP
      config:
        file-extension: yaml
        shared-dataids: common-mysql.yaml,common-rocketmq.yaml,common-sentinel.yaml
        refresh-enabled: true
        extension-configs[0]:
          dataId: mall-seckill.yaml
          group: DEFAULT_GROUP
          refresh: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:mall_seckill}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# Sentinel
spring.cloud.sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:sentinel:8858}
    port: 8719
  datasource:
    flow:
      nacos:
        server-addr: ${NACOS_SERVER:nacos:8848}
        dataId: mall-seckill-flow-rules.json
        groupId: SENTINEL_GROUP
        namespace: dev
        data-type: json
        rule-type: flow

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mallcloud.mallseckill: DEBUG

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:rocketmq-namesrv:9876}
