server:
  port: 9001

spring:
  application:
    name: mall-auth
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      namespace: dev
      config:
        file-extension: yaml
        shared-configs:
          - data-id: common-mysql.yaml
            refresh: true
          - data-id: common-redis.yaml
            refresh: true
        extension-configs:
          - dataId: mall-auth.yaml
            refresh: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mallcloud.mallauth: DEBUG
